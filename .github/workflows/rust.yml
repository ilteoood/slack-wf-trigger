name: Rust Build, Test, and Image Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build + test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Build and test binary
        uses: houseabsolute/actions-rust-cross@77a5caf54b78a8feb5c1d8d38744355e9c9b06aa
        with:
          command: both
          target: ${{ matrix.target }}
          args: "--release"
          strip: true
        env:
          CROSS_CONTAINER_OPTS: "-v /var/run/docker.sock:/var/run/docker.sock"

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: slack-wf-trigger-${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/slack-wf-trigger
          retention-days: 1

  collect_binaries:
    name: collect binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Download artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
      - name: Stage per-arch binaries
        run: |
          mkdir -p bin
          cp slack-wf-trigger-x86_64-unknown-linux-musl/slack-wf-trigger bin/slack-wf-trigger-amd64
          cp slack-wf-trigger-aarch64-unknown-linux-musl/slack-wf-trigger bin/slack-wf-trigger-arm64

  docker_image:
    name: docker image
    needs: collect_binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Log in to ghcr.io
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine image tags
        id: meta
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          short_sha=${GITHUB_SHA::7}
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
      - name: Build and push multi-arch image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.short_sha }}