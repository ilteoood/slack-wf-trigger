name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.85
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.85
      - uses: Swatinem/rust-cache@060bda31e0be4f453bb6ed2d7e5427b31734ad01
      - run: cargo test --locked

  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Build (linux/amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64
          tags: slack-wf-trigger:ci-amd64
          outputs: type=docker,dest=/tmp/slack-wf-trigger-amd64.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build (linux/arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/arm64
          tags: slack-wf-trigger:ci-arm64
          outputs: type=docker,dest=/tmp/slack-wf-trigger-arm64.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan (amd64)
        uses: aquasecurity/trivy-action@062f2592684a31eb3aa050cc61e7ca1451cecd3d
        with:
          input: /tmp/slack-wf-trigger-amd64.tar
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Trivy scan (arm64)
        uses: aquasecurity/trivy-action@062f2592684a31eb3aa050cc61e7ca1451cecd3d
        with:
          input: /tmp/slack-wf-trigger-arm64.tar
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true