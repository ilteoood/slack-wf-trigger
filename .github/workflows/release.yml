name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - id: meta
        name: Derive image metadata
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          prefix="${REGISTRY}/${IMAGE_NAME}"
          if [[ "$tag" == *-* ]]; then
            is_prerelease="true"
            tags="${prefix}:${tag}"
          else
            is_prerelease="false"
            tags="${prefix}:${tag},${prefix}:latest"
          fi
          {
            echo "version=$tag"
            echo "is_prerelease=$is_prerelease"
            echo "tags=$tags"
          } >> "$GITHUB_OUTPUT"
      - name: Verify Cargo crate version matches tag
        run: |
          crate_version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [[ "$crate_version" != "${{ steps.meta.outputs.version }}" ]]; then
            echo "::error::Cargo crate version ($crate_version) does not match tag (${{ steps.meta.outputs.version }})"
            exit 1
          fi
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Log in to ghcr.io
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        name: Build and push multi-arch image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=slack-wf-trigger
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: release
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.build-and-push.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.build-and-push.outputs.is_prerelease == 'true' }}
          body: |
            Multi-arch image published to `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.version }}`.

            Digest: `${{ needs.build-and-push.outputs.digest }}`

            Platforms: `linux/amd64`, `linux/arm64`