services:
  slack-wf-trigger:
    image: ilteoood/slack-wf-trigger:latest
    container_name: slack-wf-trigger
    restart: unless-stopped
    environment:
      SLACK_USER_TOKEN: ${SLACK_USER_TOKEN:?SLACK_USER_TOKEN must be set}
      SLACK_WF_TRIGGER_CURSORS_PATH: /var/lib/slack-wf-trigger/.slack-wf-trigger.cursors.json
    volumes:
      - ./rules.json:/etc/slack-wf-trigger/rules.json:ro
      - slack-wf-trigger-state:/var/lib/slack-wf-trigger

volumes:
  slack-wf-trigger-state: